<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛰️ Middlemen Proxy Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 20px; }
        
        .visualizer { display: flex; justify-content: space-around; align-items: center; background: #161b22; padding: 40px; border-radius: 12px; border: 1px solid #30363d; }
        .node { padding: 20px; border: 2px solid #58a6ff; border-radius: 8px; font-weight: bold; background: #0d1117; width: 150px; text-align: center; }
        .proxy { border-color: #f0883e; box-shadow: 0 0 15px rgba(240, 136, 62, 0.2); }
        
        /* Progress Bar Styling */
        .progress-container { margin-top: 30px; background: #30363d; border-radius: 20px; height: 25px; position: relative; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #238636, #2ea043); transition: width 0.3s ease; }
        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9em; color: #8b949e; }

        #log { background: #010409; height: 300px; overflow-y: auto; padding: 15px; border: 1px solid #30363d; border-radius: 8px; margin-top: 20px; font-size: 0.85em; }
        .info { color: #58a6ff; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
        .inward { color: #d29922; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛰️ Middlemen Tunnel Monitor</h1>
        <p>Real-time TCP/HTTP Data Flow Visualizer</p>
    </div>

    <div class="visualizer">
        <div class="node">👤 CLIENT</div>
        <div class="node proxy">🛠️ PROXY <br><small>127.0.0.1:1337</small></div>
        <div class="node">🌐 TARGET <br><small id="target-name">waiting...</small></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    
    <div class="stats">
        <span>Total Data Processed: <b id="total-mb">0.00</b> MB</span>
        <span id="speed-tag">Status: Idle</span>
    </div>

    <div id="log"></div>

    <script>
        const socket = io();
        let totalBytes = 0;
        const logDiv = document.getElementById('log');
        const progressBar = document.getElementById('progress-bar');
        const totalMbDisplay = document.getElementById('total-mb');
        const targetDisplay = document.getElementById('target-name');

        socket.on('status', (data) => {
            const entry = document.createElement('div');
            entry.className = data.type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${data.msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        });

        socket.on('data-flow', (data) => {
            totalBytes += data.size;
            
            // Update UI
            targetDisplay.textContent = data.target;
            totalMbDisplay.textContent = (totalBytes / (1024 * 1024)).toFixed(2);
            
            // For the progress bar, we simulate 0-100% based on chunks 
            // In a real project, you'd need the 'Content-Length' header for exact %, 
            // but for a demo, we'll just pulse the bar to show activity:
            progressBar.style.width = ( (totalBytes % 1048576) / 1048576 * 100) + "%";

            // Occasional log entry for data flow so we don't spam the UI
            if (data.size > 5000) {
                const entry = document.createElement('div');
                entry.className = 'inward';
                entry.textContent = `⚡ Large Chunk: ${(data.size / 1024).toFixed(1)} KB from ${data.target}`;
                logDiv.appendChild(entry);
            }
        });
    </script>
</body>
</html>
